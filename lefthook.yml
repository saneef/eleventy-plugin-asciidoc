pre-commit:
  commands:
    # Prettier for JS is included in ESlint
    prettier:
      glob: "*.{md,json}"
      run: npx prettier --write {staged_files}
      stage_fixed: true

    eslint:
      glob: "*.{js,mjs,cjs}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true

    tests:
      glob: "*.{js,mjs,cjs}"
      run: npm run test